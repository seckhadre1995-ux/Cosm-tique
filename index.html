<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cosmetique Services Pro | Saint-Louis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fafafa; }
        .admin-panel { display: none; position: fixed; inset: 0; background: white; z-index: 100; padding: 20px; overflow-y: auto; }
        .preview-img { width: 100%; height: 200px; object-fit: cover; border-radius: 15px; background: #f0f0f0; display: flex; align-items: center; justify-content: center; border: 2px dashed #ccc; margin-bottom: 15px; overflow: hidden; }
        .preview-img img { width: 100%; height: 100%; object-fit: cover; }
        .wa-float { position: fixed; bottom: 100px; right: 20px; background: #25d366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); z-index: 50; }
    </style>
</head>
<body class="pb-32">

    <!-- HEADER -->
    <header class="p-4 bg-white shadow-sm flex justify-between items-center sticky top-0 z-40">
        <h1 class="font-bold text-xl tracking-tighter">COSMETIQUE <span class="text-yellow-600">SERVICES</span></h1>
        <button onclick="openAdmin()" class="bg-gray-100 p-2 rounded-full text-gray-400"><i class="fas fa-cog"></i></button>
    </header>

    <!-- RECHERCHE & FILTRES -->
    <div class="p-4 bg-white">
        <input type="text" id="searchInput" oninput="render()" placeholder="🔍 Rechercher un produit..." class="w-full bg-gray-100 p-3 rounded-2xl border-none text-sm mb-4">
        <div id="catMenu" class="flex gap-2 overflow-x-auto no-scrollbar pb-2"></div>
    </div>

    <!-- GRILLE PRODUITS -->
    <main id="productGrid" class="p-4 grid grid-cols-2 gap-4">
        <!-- Les produits s'affichent ici -->
    </main>

    <!-- BOUTON WHATSAPP -->
    <a href="https://wa.me/221778165450" class="wa-float animate-bounce"><i class="fab fa-whatsapp"></i></a>

    <!-- PANIER (Résumé rapide) -->
    <div id="cartBar" class="fixed bottom-0 left-0 right-0 bg-black text-white p-5 rounded-t-[2.5rem] flex justify-between items-center shadow-2xl z-50">
        <div>
            <p class="text-[10px] text-gray-400">Total panier</p>
            <p id="totalPrice" class="font-bold text-lg text-yellow-500 text-sm">0 FCFA</p>
        </div>
        <button onclick="sendOrder()" class="bg-yellow-600 px-6 py-3 rounded-xl font-bold text-sm">COMMANDER</button>
    </div>

    <!-- MODAL ADMIN (AJOUT DE PRODUIT) -->
    <div id="adminPanel" class="admin-panel">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold text-red-600 uppercase">Gestion Boutique</h2>
            <button onclick="closeAdmin()" class="text-3xl">&times;</button>
        </div>

        <div class="space-y-4">
            <!-- ZONE PHOTO -->
            <label class="block">
                <span class="text-xs font-bold text-gray-500 uppercase">Photo du produit</span>
                <div id="imagePreview" class="preview-img mt-1">
                    <span id="placeholderText">📸 Cliquez pour prendre une photo</span>
                </div>
                <input type="file" id="imageInput" accept="image/*" class="hidden" onchange="previewFile()">
                <button onclick="document.getElementById('imageInput').click()" class="w-full bg-gray-200 p-3 rounded-xl text-sm font-bold mb-4">CHOISIR UNE IMAGE / CAMERA</button>
            </label>

            <input type="text" id="pName" placeholder="Nom de l'article (ex: Lait Mixa)" class="w-full p-4 bg-gray-50 rounded-xl border-none">
            <div class="grid grid-cols-2 gap-4">
                <input type="number" id="pPrice" placeholder="Prix (FCFA)" class="w-full p-4 bg-gray-50 rounded-xl border-none">
                <select id="pCat" class="w-full p-4 bg-gray-50 rounded-xl border-none">
                    <option value="Soins">Soins</option>
                    <option value="Parfums">Parfums</option>
                    <option value="Sacs">Sacs</option>
                    <option value="Chaussures">Chaussures</option>
                </select>
            </div>
            <textarea id="pDesc" placeholder="Petite description..." class="w-full p-4 bg-gray-50 rounded-xl border-none h-24"></textarea>
            
            <button onclick="saveProduct()" class="w-full bg-black text-white p-5 rounded-2xl font-bold uppercase tracking-widest mt-4">Publier l'article</button>
            
            <hr class="my-8">
            <h3 class="font-bold text-gray-400 mb-4">LISTE DES ARTICLES</h3>
            <div id="adminList" class="space-y-2"></div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('cosme_2026_db')) || [];
        let cart = [];
        let currentImage = ""; // Stockera l'image compressée

        // --- GESTION PHOTO (LA MEILLEURE FAÇON) ---
        function previewFile() {
            const file = document.getElementById('imageInput').files[0];
            const reader = new FileReader();

            reader.onloadend = function() {
                const img = new Image();
                img.src = reader.result;
                img.onload = function() {
                    // COMPRESSION AUTOMATIQUE (Canvas)
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 600; // Largeur max pour le web
                    const scaleSize = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scaleSize;

                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                    // Conversion en texte léger (Base64)
                    currentImage = canvas.toDataURL('image/jpeg', 0.7); // Qualité 70% pour la vitesse
                    
                    // Afficher l'aperçu
                    document.getElementById('imagePreview').innerHTML = `<img src="${currentImage}">`;
                }
            }
            if (file) reader.readAsDataURL(file);
        }

        // --- GESTION BOUTIQUE ---
        function saveProduct() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const cat = document.getElementById('pCat').value;
            const desc = document.getElementById('pDesc').value;

            if(!name || !price || !currentImage) return alert("Veuillez remplir le nom, le prix et ajouter une photo !");

            const product = { id: Date.now(), name, price, cat, desc, img: currentImage };
            db.unshift(product);
            localStorage.setItem('cosme_2026_db', JSON.stringify(db));
            
            alert("Article publié avec succès !");
            location.reload(); // Rafraîchir pour voir les changements
        }

        function render() {
            const grid = document.getElementById('productGrid');
            const search = document.getElementById('searchInput').value.toLowerCase();
            grid.innerHTML = "";

            db.filter(p => p.name.toLowerCase().includes(search)).forEach(p => {
                grid.innerHTML += `
                    <div class="bg-white rounded-3xl overflow-hidden shadow-sm border border-gray-100 flex flex-col animate__animated animate__fadeIn">
                        <img src="${p.img}" class="w-full h-40 object-cover">
                        <div class="p-3 flex flex-col flex-grow">
                            <h3 class="font-bold text-xs h-8 overflow-hidden">${p.name}</h3>
                            <p class="text-yellow-700 font-bold mt-2">${p.price} FCFA</p>
                            <button onclick="addToCart(${p.id})" class="mt-3 bg-black text-white py-2 rounded-xl text-[10px] font-bold active:scale-95 transition">AJOUTER</button>
                        </div>
                    </div>
                `;
            });
            renderAdminList();
        }

        function renderAdminList() {
            const list = document.getElementById('adminList');
            list.innerHTML = db.map(p => `
                <div class="flex items-center gap-3 p-2 bg-gray-50 rounded-xl border">
                    <img src="${p.img}" class="w-10 h-10 object-cover rounded-lg">
                    <div class="flex-grow text-[10px] font-bold">${p.name}</div>
                    <button onclick="deleteProduct(${p.id})" class="text-red-500 p-2"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
        }

        function deleteProduct(id) {
            if(confirm("Supprimer cet article ?")) {
                db = db.filter(p => p.id !== id);
                localStorage.setItem('cosme_2026_db', JSON.stringify(db));
                render();
            }
        }

        // --- GESTION PANIER ---
        function addToCart(id) {
            const p = db.find(x => x.id === id);
            cart.push(p);
            updateCart();
        }

        function updateCart() {
            const total = cart.reduce((acc, p) => acc + parseInt(p.price), 0);
            document.getElementById('totalPrice').innerText = total + " FCFA";
        }

        function sendOrder() {
            if(cart.length === 0) return alert("Le panier est vide !");
            let msg = `*COMMANDE COSMETIQUE SERVICES*%0A%0A`;
            cart.forEach(p => msg += `• ${p.name} (${p.price} FCFA)%0A`);
            msg += `%0A*TOTAL : ${document.getElementById('totalPrice').innerText}*`;
            window.open(`https://wa.me/221778165450?text=${msg}`, '_blank');
        }

        function openAdmin() { document.getElementById('adminPanel').style.display = 'block'; }
        function closeAdmin() { document.getElementById('adminPanel').style.display = 'none'; }

        render();
    </script>
</body>
</html>
