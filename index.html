<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cosmetique Services | Majestic 2026</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <!-- SDK FIREBASE (La Mémoire Partagée) -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getDatabase, ref, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

      // TES CLÉS FIREBASE OFFICIELLES (VÉRIFIÉES)
      const firebaseConfig = {
        apiKey: "AIzaSyBhCAp0R6b4QH0fKjFWZiF4fboAQwWcp9I",
        authDomain: "cosmetiqueservices.firebaseapp.com",
        databaseURL: "https://cosmetiqueservices-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "cosmetiqueservices",
        storageBucket: "cosmetiqueservices.firebasestorage.app",
        messagingSenderId: "838206036615",
        appId: "1:838206036615:web:ef9b5e78f882cdfb3b3622"
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);
      window.dbRef = ref(db, 'produits');
      window.pushData = push;
      window.dbRefSingle = (id) => ref(db, 'produits/' + id);
      window.removeData = remove;

      // ÉCOUTEUR TEMPS RÉEL : Tout le monde voit la même chose en même temps
      onValue(window.dbRef, (snapshot) => {
        const data = snapshot.val();
        window.allProducts = data ? Object.keys(data).map(key => ({id: key, ...data[key]})) : [];
        if (window.renderItems) window.renderItems();
        if (window.renderAdminList) window.renderAdminList();
        if (window.renderChips) window.renderChips();
      });
    </script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { gold: '#C5A059', deep: '#050505' } } }
        }
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #F4F1ED; color: #1a1a1a; transition: 0.5s; overflow-x: hidden; }
        .dark body { background-color: #050505; color: #f4f1ed; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.3); }
        .dark .glass { background: rgba(10, 10, 10, 0.8); border: 1px solid rgba(255,255,255,0.05); }
        #splash { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 1s cubic-bezier(1, 0, 0, 1); }
        .splash-hide { transform: translateY(-100%); opacity: 0; }
        .p-card { background: white; border-radius: 30px; border: 1px solid #eee; overflow: hidden; transition: 0.3s; }
        .dark .p-card { background: #111; border-color: #222; }
        /* Zone Photo Gérant Moderne et Proche */
        .upload-zone { border: 3px dashed #C5A059; background: rgba(197, 160, 89, 0.08); transition: 0.3s; }
        .upload-zone:active { scale: 0.96; background: rgba(197, 160, 89, 0.15); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>

<body class="pb-32">

    <!-- 1. SPLASH SCREEN -->
    <div id="splash">
        <div class="w-24 h-24 rounded-full border-4 border-gold/30 animate-pulse flex items-center justify-center">
            <span class="text-3xl font-bold text-gold">CS</span>
        </div>
        <h1 id="typewriter" class="text-white mt-8 text-2xl font-bold uppercase tracking-widest text-center px-4"></h1>
    </div>

    <!-- NOTIFICATION TOAST -->
    <div id="toast" class="fixed top-20 left-1/2 -translate-x-1/2 z-[11000] glass px-8 py-4 rounded-full text-sm font-bold shadow-2xl opacity-0 translate-y-[-50px] transition-all duration-500 pointer-events-none text-black dark:text-white"></div>

    <!-- HEADER -->
    <header class="fixed top-0 inset-x-0 z-[90] glass px-6 py-4 flex justify-between items-center shadow-md">
        <div class="flex flex-col">
            <span class="text-xl font-black text-black dark:text-white uppercase italic tracking-tighter leading-none">CS <span class="text-gold font-serif">SHOP</span></span>
            <span class="text-[9px] font-bold opacity-40 uppercase tracking-widest">Ngallèle • En Ligne 📡</span>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="toggleDark()" class="w-10 h-10 rounded-full bg-gray-100 dark:bg-white/5 flex items-center justify-center">
                <i class="fas fa-moon dark:hidden"></i><i class="fas fa-sun hidden dark:block text-gold"></i>
            </button>
            <div class="relative cursor-pointer" onclick="openCart()">
                <i class="fas fa-shopping-bag text-2xl"></i>
                <span id="cartBadge" class="absolute -top-2 -right-2 bg-red-600 text-white text-[10px] font-black w-5 h-5 flex items-center justify-center rounded-full border-2 border-white dark:border-deep hidden animate__animated animate__bounceIn">0</span>
            </div>
        </div>
    </header>

    <!-- BANNIÈRE HERO (PHOTO HD CORRIGÉE) -->
    <section class="mt-28 px-6">
        <div class="relative h-60 rounded-[3rem] overflow-hidden shadow-2xl group">
            <img src="https://images.unsplash.com/photo-1512496015851-a90fb38ba796?q=80&w=1000&auto=format&fit=crop" class="w-full h-full object-cover transition-transform duration-[10s] group-hover:scale-110">
            <div class="absolute inset-0 bg-black/40 flex flex-col justify-center px-10">
                <span class="text-gold font-bold text-[10px] uppercase tracking-widest mb-1">Prestige Edition</span>
                <h1 class="text-white text-3xl font-black leading-tight uppercase">La Beauté à <br> Portée de Main.</h1>
                <p class="text-white/60 text-[9px] mt-2 uppercase tracking-widest italic">Cosmetique Services Ngallèle</p>
            </div>
        </div>
    </section>

    <!-- RECHERCHE & FILTRES -->
    <section id="catalog" class="mt-8 px-6 sticky top-20 z-40 bg-[#F4F1ED]/90 dark:bg-[#050505]/90 py-2">
        <input type="text" id="searchInput" oninput="renderItems()" placeholder="Rechercher parfum, ventilateur, sac..." class="w-full bg-white dark:bg-white/5 border-none rounded-2xl py-4 px-12 font-semibold shadow-sm focus:ring-2 focus:ring-gold text-sm outline-none mb-4">
        <div id="catBar" class="flex gap-2 overflow-x-auto no-scrollbar pb-2"></div>
    </section>

    <!-- GRILLE PRODUITS (SYNCHRONISÉE) -->
    <main id="itemGrid" class="px-6 grid grid-cols-2 gap-4 mt-2 mb-20"></main>

    <!-- NAVIGATION BAS -->
    <nav class="fixed bottom-0 inset-x-0 h-20 glass z-[100] flex justify-around items-center px-6 shadow-2xl">
        <button onclick="nav('home')" class="flex flex-col items-center gap-1 text-gold font-bold"><i class="fas fa-home text-xl"></i><span class="text-[9px] font-bold">ACCUEIL</span></button>
        <button onclick="nav('wish')" class="flex flex-col items-center gap-1 text-gray-400 relative"><i class="fas fa-heart text-xl"></i><span id="wishCount" class="absolute -top-1 -right-1 bg-gold text-white text-[7px] font-black w-3 h-3 flex items-center justify-center rounded-full hidden">0</span><span class="text-[9px] font-bold">FAVORIS</span></button>
        <button onclick="openCart()" class="flex flex-col items-center gap-1 text-gray-400"><i class="fas fa-shopping-cart text-xl"></i><span class="text-[9px] font-bold">PANIER</span></button>
        <button onclick="openAdmin()" class="flex flex-col items-center gap-1 text-gray-400"><i class="fas fa-user-shield text-xl"></i><span class="text-[8px] font-bold uppercase font-black">Gérant</span></button>
    </nav>

    <!-- WHATSAPP FLOAT -->
    <a href="https://wa.me/221778165450" target="_blank" class="fixed bottom-24 right-6 w-14 h-14 bg-[#25D366] text-white rounded-full flex items-center justify-center text-2xl shadow-2xl z-[95] animate-bounce">
        <i class="fab fa-whatsapp"></i>
    </a>

    <!-- PANIER (LISTE CORRIGÉE) -->
    <div id="cartOverlay" class="fixed inset-0 bg-black/60 z-[200] hidden transition-opacity" onclick="closeCart()"></div>
    <aside id="cartDrawer" class="fixed right-0 top-0 bottom-0 w-[90%] max-w-md bg-white dark:bg-[#0F0F0F] z-[210] translate-x-full transition-transform duration-500 flex flex-col shadow-2xl overflow-hidden">
        <div class="p-6 border-b dark:border-white/5 flex justify-between items-center bg-gray-50 dark:bg-black">
            <h2 class="text-xl font-black uppercase tracking-tighter">Mon Panier</h2>
            <button onclick="closeCart()" class="text-3xl">&times;</button>
        </div>
        <div id="cartItems" class="flex-grow overflow-y-auto p-5 space-y-4 no-scrollbar">
            <!-- Les articles réels arrivent ici -->
        </div>
        <div class="p-6 bg-gray-50 dark:bg-white/5 border-t dark:border-white/5 space-y-5">
            <div class="grid grid-cols-1 gap-3">
                <input type="text" id="clientName" placeholder="Prénom et Nom" class="p-4 rounded-xl border outline-none text-sm bg-white dark:bg-black">
                <input type="text" id="clientArea" placeholder="Votre Quartier (Ngallèle...)" class="p-4 rounded-xl border outline-none text-sm bg-white dark:bg-black">
            </div>
            <div class="flex justify-between items-center font-black px-2 uppercase">
                <span class="text-xs opacity-40">Total</span>
                <span id="cartTotal" class="text-2xl text-gold">0 FCFA</span>
            </div>
            <button onclick="sendOrder()" class="w-full bg-black dark:bg-gold text-white dark:text-deep py-5 rounded-2xl font-black shadow-xl tracking-widest text-xs">ENVOYER LA COMMANDE</button>
        </div>
    </aside>

    <!-- ADMIN PANEL (ZONE PHOTO MODERNE) -->
    <div id="adminPanel" class="fixed inset-0 z-[5000] hidden bg-white dark:bg-black p-6 overflow-y-auto no-scrollbar flex flex-col">
        <div class="flex justify-between items-center mb-8"><h2 class="text-xl font-black gold-text uppercase">Gestion Boutique</h2><button onclick="closeAdmin()" class="text-4xl">&times;</button></div>
        
        <div id="adminAuth" class="py-20 text-center">
            <input type="password" id="adminPass" placeholder="••••" class="bg-transparent border-b-2 border-gold p-4 text-center text-4xl outline-none mb-10 w-40 dark:text-white font-bold">
            <br><button onclick="verifyAdmin()" class="bg-gold text-white px-12 py-4 rounded-full font-black uppercase tracking-widest shadow-lg">Entrer</button>
        </div>

        <div id="adminTools" class="hidden space-y-8 animate__animated animate__fadeIn pb-32">
            <form class="glass p-8 rounded-[2.5rem] space-y-6 shadow-inner" onsubmit="saveProduct(event)">
                <h3 class="font-black text-center text-[10px] uppercase opacity-40 tracking-[0.2em]">Nouveau Produit Public</h3>
                
                <!-- ZONE PHOTO MISE À JOUR -->
                <div class="space-y-3">
                    <div id="photoPreviews" class="grid grid-cols-4 gap-2 mb-2"></div>
                    <label class="upload-zone flex flex-col items-center justify-center w-full h-44 rounded-[2rem] cursor-pointer shadow-lg">
                        <div class="text-center">
                            <i class="fas fa-camera-retro text-4xl text-gold mb-3"></i>
                            <p class="text-[11px] font-black text-gold uppercase tracking-widest">Prendre / Choisir Photo</p>
                            <p class="text-[8px] text-gray-400 mt-1 uppercase font-bold italic">Les clientes verront cette image</p>
                        </div>
                        <input type="file" multiple accept="image/*" onchange="handlePhotos(event)" class="hidden">
                    </label>
                </div>

                <input type="text" id="pName" placeholder="Nom de l'article" class="w-full p-5 rounded-2xl bg-white dark:bg-white/5 border outline-none font-bold" required>
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="pPrice" placeholder="Prix (FCFA)" class="w-full p-5 rounded-2xl border bg-white dark:bg-white/5 font-black" required>
                    <select id="pCat" class="w-full p-5 rounded-2xl border bg-white dark:bg-white/5 font-black text-[10px] cursor-pointer">
                        <option value="✨ Soins & Beauté">✨ Soins & Beauté</option>
                        <option value="🌸 Parfumerie">🌸 Parfumerie</option>
                        <option value="👜 Sacs & Luxe">👜 Sacs & Luxe</option>
                        <option value="👟 Chaussures">👟 Chaussures</option>
                        <option value="🧢 Casquettes">🧢 Casquettes</option>
                        <option value="🌬️ Ventilateurs">🌬️ Ventilateurs</option>
                        <option value="👶 Bébé">👶 Bébé</option>
                        <option value="➕ Autre">➕ Autre catégorie...</option>
                    </select>
                </div>
                <textarea id="pDesc" placeholder="Description courte pour les clientes..." class="w-full p-5 rounded-2xl border h-24 outline-none bg-white dark:bg-white/5 font-medium"></textarea>
                <button type="submit" class="w-full bg-black dark:bg-gold dark:text-black text-white py-5 rounded-3xl font-black uppercase text-[10px] shadow-2xl tracking-[0.2em]">Publier pour tout le monde</button>
            </form>
            <div id="adminProdList" class="space-y-4"></div>
        </div>
    </div>

    <!-- MODAL DETAIL -->
    <div id="detailModal" class="fixed inset-0 z-[1000] hidden bg-black/95 flex flex-col items-center justify-center p-4">
        <button onclick="closeDetail()" class="absolute top-6 right-6 text-white text-3xl">&times;</button>
        <div class="bg-white dark:bg-[#111] w-full max-w-lg rounded-[2.5rem] overflow-hidden flex flex-col shadow-2xl animate__animated animate__fadeInUp">
            <div id="galleryTrack" class="h-72 flex overflow-hidden"></div>
            <div id="detailContent" class="p-8 space-y-4 overflow-y-auto max-h-[45vh]"></div>
        </div>
    </div>

    <script>
        window.allProducts = [];
        let cart = [];
        let wishlist = JSON.parse(localStorage.getItem('cs_wish_db')) || [];
        let filterCat = 'Tout';
        let isWishView = false;
        let tempPhotos = [];

        // --- SPLASH & TYPING ---
        setTimeout(() => document.getElementById('splash').classList.add('splash-hide'), 3000);
        const txt = "Cosmetique Services"; let i_t = 0;
        const type = () => { if(i_t < txt.length){ document.getElementById('typewriter').innerHTML += txt.charAt(i_t); i_t++; setTimeout(type, 100); } };
        type();

        // --- CORE UI RENDERING ---
        window.renderItems = () => {
            const grid = document.getElementById('itemGrid');
            const search = document.getElementById('searchInput').value.toLowerCase();
            grid.innerHTML = '';
            const filtered = window.allProducts.filter(p => (isWishView ? wishlist.includes(p.id) : (filterCat==='Tout' || p.cat.includes(filterCat)) && p.name.toLowerCase().includes(search)));
            
            filtered.forEach(p => {
                const loved = wishlist.includes(p.id);
                grid.innerHTML += `
                    <div class="p-card shadow-lg flex flex-col relative animate__animated animate__fadeIn">
                        <img src="${p.img}" onclick="openDetail('${p.id}')" class="w-full h-44 object-cover cursor-pointer">
                        <button onclick="toggleWish('${p.id}', event)" class="absolute top-3 right-3 w-8 h-8 rounded-full bg-white/90 flex items-center justify-center shadow-md transition-all active:scale-125"><i class="fas fa-heart ${loved ? 'text-red-500' : 'text-gray-300'}"></i></button>
                        <div class="p-4 flex flex-col flex-grow">
                            <span class="text-[7px] text-gold font-black uppercase opacity-60">${p.cat}</span>
                            <h3 class="font-bold text-[10px] uppercase line-clamp-1 mt-1 mb-2 leading-none">${p.name}</h3>
                            <p class="font-black text-xs text-black dark:text-white mt-auto tracking-tight">${p.price.toLocaleString()} FCFA</p>
                            <button onclick="addToCart('${p.id}')" class="mt-3 w-full bg-black dark:bg-gold text-white dark:text-black py-3 rounded-2xl text-[9px] font-black active:scale-95 transition-all shadow-md uppercase">Ajouter</button>
                        </div>
                    </div>
                `;
            });
        };

        window.renderChips = () => {
            const cats = ['Tout', ...new Set(window.allProducts.map(p => p.cat.split(' ').pop()))];
            document.getElementById('catBar').innerHTML = cats.map(c => `
                <button onclick="setFilter('${c}')" class="px-5 py-2.5 rounded-full bg-white dark:bg-white/5 border text-[10px] font-black whitespace-nowrap shadow-sm ${filterCat===c?'bg-black text-white border-black scale-105 shadow-xl':''} transition-all">
                    ${c.toUpperCase()}
                </button>
            `).join('');
        };

        // --- CART SYSTEM (FIXED) ---
        function addToCart(id) {
            const p = window.allProducts.find(x => x.id === id);
            const exist = cart.find(x => x.id === id);
            if(exist) exist.qty++; else cart.push({...p, qty: 1});
            showToast("Sublimé ! Ajouté au panier ✨");
            updateCartBadge();
        }

        function updateCartBadge() {
            const total = cart.reduce((acc, curr) => acc + curr.qty, 0);
            const b = document.getElementById('cartBadge');
            b.innerText = total; b.classList.toggle('hidden', total === 0);
            if(total > 0) b.classList.add('animate__bounceIn');
        }

        function updateCartUI() {
            let total = 0;
            const cont = document.getElementById('cartItems');
            cont.innerHTML = cart.map((item, idx) => {
                total += item.price * item.qty;
                return `
                    <div class="flex items-center gap-4 bg-gray-50 dark:bg-white/5 p-4 rounded-[2rem] border border-gray-100 dark:border-white/10 shadow-sm animate__animated animate__fadeIn">
                        <img src="${item.img}" class="w-16 h-16 rounded-2xl object-cover shadow-sm">
                        <div class="flex-grow">
                            <h4 class="font-black text-[10px] uppercase leading-tight">${item.name}</h4>
                            <p class="text-[10px] text-gold font-black mt-1">${item.price.toLocaleString()} FCFA</p>
                            <div class="flex items-center gap-4 mt-2 bg-white dark:bg-black w-fit px-3 py-1 rounded-full border">
                                <button onclick="changeQty(${idx},-1)" class="text-xs font-bold text-gray-400">-</button>
                                <span class="font-black text-[11px]">${item.qty}</span>
                                <button onclick="changeQty(${idx},1)" class="text-gold font-bold">+</button>
                            </div>
                        </div>
                        <button onclick="cart.splice(${idx},1); updateCartUI(); updateCartBadge();" class="text-red-300 p-2"><i class="fas fa-trash-alt"></i></button>
                    </div>
                `;
            }).join('');
            document.getElementById('cartTotal').innerText = total.toLocaleString() + " FCFA";
            if(!cart.length) cont.innerHTML = `<div class="text-center py-20 opacity-20 font-black text-xs uppercase tracking-widest italic">Le panier est vide...</div>`;
        }

        window.changeQty = (idx, d) => { cart[idx].qty += d; if(cart[idx].qty < 1) cart.splice(idx,1); updateCartUI(); updateCartBadge(); };

        // --- GESTION GÉRANT (PHOTO MODERNE) ---
        function verifyAdmin() { if(document.getElementById('adminPass').value === '2026'){ document.getElementById('adminAuth').classList.add('hidden'); document.getElementById('adminTools').classList.remove('hidden'); window.renderAdminList(); } }
        
        async function handlePhotos(e) {
            for(let f of e.target.files) {
                const b64 = await new Promise(res => { const r = new FileReader(); r.readAsDataURL(f); r.onload = ev => res(ev.target.result); });
                tempPhotos.push(b64);
            }
            document.getElementById('photoPreviews').innerHTML = tempPhotos.map((p,i) => `
                <div class="relative h-14 rounded-xl overflow-hidden border-2 border-gold shadow-sm">
                    <img src="${p}" class="w-full h-full object-cover">
                    <button onclick="tempPhotos.splice(${i},1); renderPhotoPreviews();" class="absolute top-0 right-0 bg-red-600 text-white w-4 h-4 flex items-center justify-center rounded-full text-[8px]">&times;</button>
                </div>
            `).join('');
        }

        window.saveProduct = async (e) => {
            e.preventDefault();
            if(!tempPhotos.length) return alert("Une photo au moins est requise !");
            const data = {
                name: document.getElementById('pName').value,
                price: parseInt(document.getElementById('pPrice').value),
                cat: document.getElementById('pCat').value,
                desc: document.getElementById('pDesc').value,
                img: tempPhotos[0]
            };
            await window.pushData(window.dbRef, data);
            alert("Publié sur Internet ! Toutes vos clientes voient maintenant l'article.");
            e.target.reset(); tempPhotos = []; document.getElementById('photoPreviews').innerHTML = '';
        };

        window.renderAdminList = () => {
            document.getElementById('adminProdList').innerHTML = window.allProducts.map(p => `
                <div class="flex items-center gap-4 bg-white dark:bg-white/5 p-4 rounded-3xl border border-gray-100 dark:border-white/10 shadow-md">
                    <img src="${p.img}" class="w-12 h-12 rounded-xl object-cover shadow-sm">
                    <span class="flex-grow font-black text-[10px] uppercase">${p.name}</span>
                    <button onclick="window.removeData('${p.id}')" class="text-red-400 p-2 text-lg"><i class="fas fa-trash-alt"></i></button>
                </div>
            `).join('');
        };

        // --- HELPERS ---
        function toggleDark() { const d = document.documentElement.classList.toggle('dark'); localStorage.setItem('theme', d ? 'dark' : 'light'); }
        function openCart() { document.getElementById('cartDrawer').style.transform = 'translateX(0)'; document.getElementById('cartOverlay').classList.remove('hidden'); updateCartUI(); }
        function closeCart() { document.getElementById('cartDrawer').style.transform = 'translateX(100%)'; document.getElementById('cartOverlay').classList.add('hidden'); }
        function openAdmin() { document.getElementById('adminPanel').classList.remove('hidden'); }
        function closeAdmin() { document.getElementById('adminPanel').classList.add('hidden'); }
        function setFilter(c) { filterCat = c; isWishView = false; window.renderItems(); window.renderChips(); }
        function nav(t) { if(t === 'home'){ filterCat = 'Tout'; isWishView = false; } if(t === 'wish'){ isWishView = true; } window.renderItems(); }
        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.opacity = '1'; t.style.transform = 'translate(-50%, 0)'; setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translate(-50%, -50px)'; }, 2500); }
        function sendOrder() {
            const n = document.getElementById('clientName').value; const a = document.getElementById('clientArea').value;
            if(!n || !a || !cart.length) return showToast("Veuillez remplir vos infos de livraison ! 📍");
            let m = `*COMMANDE COSMETIQUE SERVICES LIVE 🌍*%0A📍 _Client: ${n} (${a})_%0A--------------------------------%0A`;
            cart.forEach(i => m += `• *${i.qty}x* ${i.name} (${i.price * i.qty} FCFA)%0A`);
            m += `--------------------------------%0A*TOTAL : ${document.getElementById('cartTotal').innerText}*%0A%0A_Merci de confirmer ma commande ! ✨_`;
            window.open(`https://wa.me/221778165450?text=${m}`, '_blank');
        }
        function toggleWish(id, e) { e.stopPropagation(); const idx = wishlist.indexOf(id); if(idx > -1) wishlist.splice(idx,1); else wishlist.push(id); localStorage.setItem('cs_wish_db', JSON.stringify(wishlist)); updateWishCount(); window.renderItems(); }
        function updateWishCount() { const b = document.getElementById('wishCount'); b.innerText = wishlist.length; b.classList.toggle('hidden', wishlist.length === 0); }
        function openDetail(id) {
            const p = window.allProducts.find(x => x.id === id);
            document.getElementById('galleryTrack').innerHTML = `<img src="${p.img}" class="w-full h-full object-cover">`;
            document.getElementById('detailContent').innerHTML = `
                <div class="flex justify-between items-start"><h2 class="text-2xl font-black uppercase leading-tight">${p.name}</h2><p class="text-xl font-black text-gold">${p.price.toLocaleString()} FCFA</p></div>
                <p class="text-xs text-gray-500 font-medium leading-relaxed italic">"${p.desc || 'Produit d\'exception sélectionné par Cosmetique Services.'}"</p>
                <button onclick="addToCart('${p.id}'); closeDetail();" class="w-full gold-gradient py-5 rounded-[2rem] text-white font-black uppercase text-[10px] tracking-widest shadow-2xl active:scale-95 transition-all">Ajouter au panier</button>
            `;
            document.getElementById('detailModal').style.display = 'flex';
        }
        function closeDetail() { document.getElementById('detailModal').style.display = 'none'; }
    </script>
</body>
                    </html>
