<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cosmetique Services | Saint-Louis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        
        :root { --gold: #D4AF37; --dark: #0A0A0A; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fafafa; overflow-x: hidden; }
        h1, h2, .font-luxury { font-family: 'Playfair Display', serif; }

        /* SPLASH SCREEN */
        #splash {
            position: fixed; inset: 0; background: var(--dark); z-index: 999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: transform 0.8s cubic-bezier(0.7, 0, 0.3, 1);
        }
        .logo-pulse {
            width: 100px; height: 100px; border: 3px solid var(--gold); border-radius: 50%;
            display: flex; items-center; justify-content: center; color: var(--gold);
            font-size: 2.5rem; font-weight: bold; margin-bottom: 2rem;
            animation: pulse-gold 2s infinite;
        }
        @keyframes pulse-gold { 0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(212, 175, 55, 0); } 100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); } }
        
        .typewriter h1 { overflow: hidden; border-right: .15em solid var(--gold); white-space: nowrap; margin: 0 auto; letter-spacing: .15em; animation: typing 2s steps(40, end), blink-caret .75s step-end infinite; }
        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: var(--gold); } }

        /* SKELETON LOADING */
        .skeleton { background: #eee; background: linear-gradient(110deg, #ececec 8%, #f5f5f5 18%, #ececec 33%); background-size: 200% 100%; animation: 1.5s shine linear infinite; border-radius: 1rem; }
        @keyframes shine { to { background-position-x: -200%; } }

        /* UI COMPONENTS */
        .gold-text { background: linear-gradient(135deg, #D4AF37 0%, #F9F295 50%, #D4AF37 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .active-tab { color: var(--gold) !important; transform: translateY(-3px); }
        .cart-drawer { transform: translateX(100%); transition: transform 0.4s ease-in-out; }
        .cart-drawer.open { transform: translateX(0); }
        .glass-header { backdrop-filter: blur(15px); background: rgba(255, 255, 255, 0.85); }
        
        /* Product Cards */
        .list-view .product-card { display: flex; flex-direction: row; height: 140px; }
        .list-view .product-card .img-container { width: 120px; flex-shrink: 0; }
        .grid-view .product-card { display: flex; flex-direction: column; }
        
        /* Floating Button */
        .wa-float { position: fixed; bottom: 100px; right: 20px; background: #25d366; color: white; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 45; transition: 0.3s; }
        .wa-float:active { scale: 0.9; }
    </style>
</head>
<body>

    <!-- SPLASH SCREEN -->
    <div id="splash">
        <div class="logo-pulse">CS</div>
        <div class="typewriter text-center">
            <h1 class="text-white text-xl font-bold mb-2">COSMETIQUE SERVICES</h1>
            <p id="splash-sub" class="text-gray-400 opacity-0 text-xs tracking-[0.3em]">SAINT-LOUIS NGALLÈLE</p>
        </div>
        <div class="w-48 h-1 bg-gray-800 rounded-full mt-10 overflow-hidden">
            <div id="load-bar" class="h-full bg-yellow-600 transition-all duration-1000 w-0"></div>
        </div>
    </div>

    <!-- NOTIFICATION ADD -->
    <div id="toast" class="fixed top-24 left-1/2 -translate-x-1/2 z-[100] bg-black text-white px-6 py-3 rounded-full text-xs font-bold shadow-2xl opacity-0 transition-opacity pointer-events-none">
        Article ajouté au panier ! ✨
    </div>

    <!-- HEADER -->
    <header class="glass-header sticky top-0 z-40 px-4 py-3 border-b border-gray-100 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="font-luxury font-bold text-xl tracking-tighter">C<span class="text-yellow-600">S</span></div>
            <div class="h-6 w-[1px] bg-gray-200"></div>
            <span class="text-[10px] font-bold tracking-widest text-gray-500 uppercase">Boutique Officielle</span>
        </div>
        <div class="flex gap-4 items-center">
            <button onclick="toggleView()" class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-500">
                <i id="viewIcon" class="fas fa-th-large"></i>
            </button>
            <button onclick="openAdmin()" class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-400"><i class="fas fa-lock text-xs"></i></button>
        </div>
    </header>

    <!-- SEARCH & FILTERS -->
    <div class="p-4 bg-white sticky top-[60px] z-30">
        <div class="relative mb-4">
            <input type="text" id="searchInput" oninput="renderProducts()" placeholder="Que cherchez-vous ?" class="w-full bg-gray-100 border-none rounded-2xl py-3 px-12 focus:ring-1 focus:ring-yellow-500 text-sm">
            <i class="fas fa-search absolute left-4 top-4 text-gray-400 text-sm"></i>
        </div>
        <div id="catBox" class="flex gap-2 overflow-x-auto no-scrollbar pb-1"></div>
    </div>

    <!-- PRODUCT LIST -->
    <main id="mainGrid" class="p-4 grid grid-cols-2 gap-4 mb-28 transition-all">
        <!-- Skeleton Loader par défaut -->
        <div class="skeleton h-60 w-full"></div>
        <div class="skeleton h-60 w-full"></div>
        <div class="skeleton h-60 w-full"></div>
        <div class="skeleton h-60 w-full"></div>
    </main>

    <!-- WHATSAPP FLOATING -->
    <a href="https://wa.me/221778165450" target="_blank" class="wa-float">
        <i class="fab fa-whatsapp"></i>
    </a>

    <!-- BOTTOM NAV -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white/95 border-t border-gray-100 z-50 px-8 py-3 flex justify-between items-center rounded-t-3xl shadow-[0_-10px_30px_rgba(0,0,0,0.05)]">
        <button onclick="window.scrollTo({top:0, behavior:'smooth'})" class="nav-btn active-tab flex flex-col items-center">
            <i class="fas fa-home text-lg"></i>
            <span class="text-[9px] font-bold mt-1">ACCUEIL</span>
        </button>
        <div class="relative">
            <button onclick="toggleCart()" class="nav-btn flex flex-col items-center text-gray-400">
                <i class="fas fa-shopping-bag text-lg"></i>
                <span class="text-[9px] font-bold mt-1">PANIER</span>
                <span id="cartCount" class="absolute -top-1 -right-2 bg-yellow-600 text-white text-[9px] font-black w-4 h-4 rounded-full flex items-center justify-center hidden">0</span>
            </button>
        </div>
        <a href="tel:+221778165450" class="nav-btn flex flex-col items-center text-gray-400">
            <i class="fas fa-phone text-lg"></i>
            <span class="text-[9px] font-bold mt-1">CONTACT</span>
        </a>
    </nav>

    <!-- CART DRAWER -->
    <div id="cartOverlay" class="fixed inset-0 bg-black/40 z-[55] hidden opacity-0 transition-opacity" onclick="toggleCart()"></div>
    <div id="cartDrawer" class="fixed right-0 top-0 bottom-0 w-full max-w-md bg-white z-[60] cart-drawer flex flex-col shadow-2xl">
        <div class="p-6 flex justify-between items-center border-b">
            <h2 class="font-luxury text-2xl font-bold">Ma Sélection</h2>
            <button onclick="toggleCart()" class="text-3xl text-gray-300">&times;</button>
        </div>
        <div id="cartContent" class="flex-grow overflow-y-auto p-6 space-y-4"></div>
        <div class="p-6 bg-gray-50 rounded-t-3xl shadow-inner">
            <div class="flex justify-between font-bold text-xl mb-6">
                <span>Total :</span>
                <span class="text-yellow-700" id="totalPrice">0 FCFA</span>
            </div>
            <div class="flex gap-4 justify-center mb-6 opacity-80">
                <img src="https://upload.wikimedia.org/wikipedia/commons/d/d1/Orange_logo.svg" class="h-5">
                <img src="https://wave.com/static/wave-logo-fb9e2d7d.png" class="h-5">
                <span class="text-[10px] text-gray-400 self-center">LIVRAISON PARTOUT</span>
            </div>
            <button onclick="checkout()" class="w-full bg-black text-white font-bold py-5 rounded-2xl flex items-center justify-center gap-3 active:scale-95 transition">
                <i class="fab fa-whatsapp text-2xl text-green-400"></i> COMMANDER SUR WHATSAPP
            </button>
        </div>
    </div>

    <!-- PRODUCT DETAIL MODAL -->
    <div id="detailModal" class="fixed inset-0 z-[70] hidden bg-black/90 items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-[2.5rem] overflow-hidden relative animate__animated animate__fadeInUp">
            <button onclick="closeDetail()" class="absolute top-5 right-5 z-10 bg-black/20 text-white w-10 h-10 rounded-full backdrop-blur-md flex items-center justify-center text-2xl">&times;</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <!-- ADMIN -->
    <div id="adminModal" class="fixed inset-0 z-[100] hidden bg-white p-6 overflow-y-auto">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-3xl font-luxury font-bold">ADMIN PANEL</h2>
            <button onclick="closeAdmin()" class="bg-gray-100 w-10 h-10 rounded-full">&times;</button>
        </div>
        <div id="adminAuth" class="max-w-md mx-auto py-10">
            <input type="password" id="passCode" placeholder="Code Secret" class="w-full border-b-2 p-4 text-center text-2xl mb-4 focus:outline-none focus:border-yellow-600">
            <button onclick="login()" class="w-full bg-black text-white p-4 rounded-2xl font-bold uppercase tracking-widest">Entrer</button>
        </div>
        <div id="adminTools" class="hidden space-y-6">
            <div class="grid grid-cols-2 gap-3">
                <button onclick="exportDB()" class="bg-blue-600 text-white p-4 rounded-xl font-bold"><i class="fas fa-file-export mr-2"></i>Exporter</button>
                <label class="bg-purple-600 text-white p-4 rounded-xl font-bold text-center cursor-pointer">
                    <i class="fas fa-file-import mr-2"></i>Importer <input type="file" onchange="importDB(event)" hidden>
                </label>
            </div>
            <div class="bg-gray-50 p-6 rounded-3xl space-y-4 shadow-inner border border-gray-100">
                <h3 class="font-bold uppercase text-xs text-gray-500">Ajouter / Modifier un produit</h3>
                <input type="hidden" id="editId">
                <input type="text" id="pName" placeholder="Nom du produit" class="w-full p-3 rounded-xl border">
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="pPrice" placeholder="Prix (FCFA)" class="p-3 rounded-xl border">
                    <input type="number" id="pOld" placeholder="Ancien prix (Optionnel)" class="p-3 rounded-xl border">
                </div>
                <input type="text" id="pCat" placeholder="Catégorie" class="w-full p-3 rounded-xl border">
                <input type="text" id="pImg" placeholder="Lien URL de l'image" class="w-full p-3 rounded-xl border">
                <textarea id="pDesc" placeholder="Description courte..." class="w-full p-3 rounded-xl border"></textarea>
                <button onclick="saveProduct()" class="w-full bg-yellow-600 text-white p-4 rounded-2xl font-bold uppercase">Sauvegarder</button>
            </div>
            <div id="adminList" class="space-y-2 mt-10"></div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('cs_2026_pro')) || [];
        let cart = [];
        let viewType = 'grid';
        let filter = 'Tout';

        // --- SPLASH SCREEN LOGIC ---
        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('load-bar').style.width = '100%';
            setTimeout(() => document.getElementById('splash-sub').classList.add('animate__animated', 'animate__fadeIn'), 800);
            setTimeout(() => {
                const splash = document.getElementById('splash');
                splash.style.transform = 'translateY(-100%)';
                initApp();
            }, 2800);
        });

        function initApp() {
            renderCategories();
            renderProducts();
        }

        // --- RENDER FUNCTIONS ---
        function renderCategories() {
            const cats = ['Tout', ...new Set(db.map(p => p.cat))];
            document.getElementById('catBox').innerHTML = cats.map(c => `
                <button onclick="setFilter('${c}')" class="px-5 py-2.5 rounded-2xl border text-xs font-bold whitespace-nowrap transition-all ${filter === c ? 'bg-black text-white border-black' : 'bg-gray-50 text-gray-500 border-gray-100'}">
                    ${c}
                </button>
            `).join('');
        }

        function renderProducts() {
            const grid = document.getElementById('mainGrid');
            const search = document.getElementById('searchInput').value.toLowerCase();
            grid.className = viewType === 'grid' ? 'p-4 grid grid-cols-2 gap-4 mb-28' : 'p-4 flex flex-col gap-4 mb-28';
            grid.innerHTML = '';

            const items = db.filter(p => (filter === 'Tout' || p.cat === filter) && p.name.toLowerCase().includes(search));

            if(items.length === 0) {
                grid.innerHTML = `<div class="col-span-2 py-20 text-center opacity-30"><i class="fas fa-box-open text-6xl mb-4"></i><p>Aucun article trouvé</p></div>`;
                return;
            }

            items.forEach(p => {
                const isSoldOut = p.stock === false;
                grid.innerHTML += `
                    <div class="product-card bg-white rounded-[2rem] overflow-hidden shadow-sm border border-gray-50 relative animate__animated animate__fadeInUp">
                        <div class="img-container relative group cursor-pointer" onclick="viewDetail(${p.id})">
                            <img src="${p.img}" onerror="this.src='https://via.placeholder.com/400?text=CS+Ngallèle'" class="w-full h-44 object-cover ${isSoldOut ? 'grayscale opacity-40' : ''}">
                            ${p.old ? `<span class="absolute top-3 left-3 bg-red-600 text-white text-[9px] font-black px-2 py-1 rounded-full">PROMO</span>` : ''}
                            ${isSoldOut ? `<div class="absolute inset-0 flex items-center justify-center font-black text-red-600 text-xs bg-white/40">ÉPUISÉ</div>` : ''}
                        </div>
                        <div class="p-4 flex flex-col flex-grow">
                            <h3 class="font-bold text-xs text-gray-800 line-clamp-1 h-4">${p.name}</h3>
                            <div class="mt-2 flex items-baseline gap-2">
                                <span class="font-bold text-sm">${p.price} FCFA</span>
                                ${p.old ? `<span class="text-[10px] text-gray-300 line-through">${p.old}</span>` : ''}
                            </div>
                            <button onclick="addToCart(${p.id})" ${isSoldOut ? 'disabled' : ''} class="mt-3 w-full bg-black text-white py-3 rounded-2xl text-[10px] font-black active:scale-90 transition ${isSoldOut ? 'opacity-20 pointer-events-none' : ''}">
                                AJOUTER
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        // --- CART LOGIC ---
        function addToCart(id) {
            const p = db.find(x => x.id === id);
            const inCart = cart.find(x => x.id === id);
            if(inCart) inCart.qty++; else cart.push({...p, qty: 1});
            
            // Notification toast
            const toast = document.getElementById('toast');
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 2000);
            
            updateCart();
        }

        function updateCart() {
            const count = cart.reduce((a, b) => a + b.qty, 0);
            const badge = document.getElementById('cartCount');
            badge.innerText = count;
            badge.classList.toggle('hidden', count === 0);

            let total = 0;
            document.getElementById('cartContent').innerHTML = cart.map((item, idx) => {
                total += item.price * item.qty;
                return `
                    <div class="flex items-center gap-4 bg-gray-50 p-4 rounded-2xl">
                        <img src="${item.img}" class="w-16 h-16 rounded-xl object-cover">
                        <div class="flex-grow">
                            <p class="font-bold text-xs">${item.name}</p>
                            <p class="text-xs text-yellow-700 font-bold">${item.price} FCFA</p>
                        </div>
                        <div class="flex items-center gap-3 bg-white px-3 py-1 rounded-full border">
                            <button onclick="changeQty(${idx}, -1)" class="text-gray-300"><i class="fas fa-minus text-xs"></i></button>
                            <span class="text-sm font-bold">${item.qty}</span>
                            <button onclick="changeQty(${idx}, 1)" class="text-yellow-600"><i class="fas fa-plus text-xs"></i></button>
                        </div>
                    </div>
                `;
            }).join('');
            
            if(cart.length === 0) document.getElementById('cartContent').innerHTML = `<div class="text-center py-20 opacity-30 italic">Panier vide...</div>`;
            document.getElementById('totalPrice').innerText = total.toLocaleString() + " FCFA";
        }

        function changeQty(idx, v) { cart[idx].qty += v; if(cart[idx].qty < 1) cart.splice(idx, 1); updateCart(); }
        
        function checkout() {
            if(cart.length === 0) return;
            let msg = `*COMMANDE COSMETIQUE SERVICES*%0A📍 Saint-Louis, Ngallèle%0A--------------------------------%0A`;
            let t = 0; cart.forEach(i => { msg += `• ${i.qty}x ${i.name} (${i.price * i.qty} FCFA)%0A`; t += i.price * i.qty; });
            msg += `--------------------------------%0A*TOTAL : ${t} FCFA*%0A%0A_Merci de traiter ma commande ! 🎉_`;
            window.open(`https://wa.me/221778165450?text=${msg}`, '_blank');
            cart = []; updateCart(); toggleCart();
        }

        // --- UX HELPERS ---
        function toggleCart() {
            const d = document.getElementById('cartDrawer');
            const o = document.getElementById('cartOverlay');
            d.classList.toggle('open');
            o.classList.toggle('hidden');
            setTimeout(() => o.classList.toggle('opacity-100'), 10);
        }
        function toggleView() { 
            viewType = viewType === 'grid' ? 'list' : 'grid'; 
            document.getElementById('viewIcon').className = viewType === 'grid' ? 'fas fa-th-large' : 'fas fa-list';
            renderProducts(); 
        }
        function setFilter(c) { 
            filter = c; 
            renderCategories(); 
            renderProducts(); 
            window.scrollTo({top: 150, behavior:'smooth'});
        }
        function viewDetail(id) {
            const p = db.find(x => x.id === id);
            document.getElementById('modalBody').innerHTML = `
                <img src="${p.img}" class="w-full h-80 object-cover">
                <div class="p-8">
                    <span class="text-[10px] font-black text-yellow-600 uppercase tracking-widest">${p.cat}</span>
                    <h2 class="text-2xl font-luxury font-bold mt-2">${p.name}</h2>
                    <p class="text-gray-500 text-sm mt-4 leading-relaxed">${p.desc || 'Qualité supérieure. Disponible à Ngallèle.'}</p>
                    <div class="flex items-center justify-between mt-8 border-t pt-6">
                        <span class="text-2xl font-black">${p.price} FCFA</span>
                        <button onclick="addToCart(${p.id}); closeDetail();" class="bg-black text-white px-8 py-4 rounded-2xl font-bold active:scale-90 transition">AJOUTER</button>
                    </div>
                </div>
            `;
            document.getElementById('detailModal').style.display = 'flex';
        }
        function closeDetail() { document.getElementById('detailModal').style.display = 'none'; }

        // --- ADMIN SYSTEM ---
        function openAdmin() { document.getElementById('adminModal').classList.remove('hidden'); }
        function closeAdmin() { document.getElementById('adminModal').classList.add('hidden'); }
        function login() { if(document.getElementById('passCode').value === '2026') { document.getElementById('adminAuth').classList.add('hidden'); document.getElementById('adminTools').classList.remove('hidden'); renderAdminList(); } else alert('Code incorrect'); }

        function saveProduct() {
            const name = document.getElementById('pName').value;
            const price = parseInt(document.getElementById('pPrice').value);
            const old = document.getElementById('pOld').value;
            const cat = document.getElementById('pCat').value;
            const img = document.getElementById('pImg').value;
            const desc = document.getElementById('pDesc').value;
            const editId = document.getElementById('editId').value;

            if(!name || !price) return alert('Champs obligatoires !');

            if(editId) {
                const idx = db.findIndex(x => x.id == editId);
                db[idx] = {...db[idx], name, price, old, cat, img, desc};
            } else {
                db.unshift({ id: Date.now(), name, price, old, cat, img, desc, stock: true });
            }
            
            localStorage.setItem('cs_2026_pro', JSON.stringify(db));
            resetForm(); renderProducts(); renderAdminList(); renderCategories();
            alert('Enregistré !');
        }

        function renderAdminList() {
            document.getElementById('adminList').innerHTML = db.map(p => `
                <div class="flex items-center gap-4 bg-white p-3 rounded-xl border mb-2">
                    <img src="${p.img}" class="w-10 h-10 object-cover rounded">
                    <div class="flex-grow"><p class="text-[10px] font-bold">${p.name}</p></div>
                    <div class="flex gap-2">
                        <button onclick="editProd(${p.id})" class="text-blue-500"><i class="fas fa-edit"></i></button>
                        <button onclick="toggleStockAdmin(${p.id})" class="${p.stock ? 'text-green-500' : 'text-gray-300'}"><i class="fas fa-check-circle"></i></button>
                        <button onclick="deleteProd(${p.id})" class="text-red-500"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function deleteProd(id) { if(confirm('Supprimer ?')) { db = db.filter(x => x.id !== id); localStorage.setItem('cs_2026_pro', JSON.stringify(db)); renderAdminList(); renderProducts(); } }
        function toggleStockAdmin(id) { const p = db.find(x => x.id === id); p.stock = !p.stock; localStorage.setItem('cs_2026_pro', JSON.stringify(db)); renderAdminList(); renderProducts(); }
        function editProd(id) {
            const p = db.find(x => x.id === id);
            document.getElementById('editId').value = p.id;
            document.getElementById('pName').value = p.name;
            document.getElementById('pPrice').value = p.price;
            document.getElementById('pOld').value = p.old || '';
            document.getElementById('pCat').value = p.cat;
            document.getElementById('pImg').value = p.img;
            document.getElementById('pDesc').value = p.desc || '';
            window.scrollTo({top: 0, behavior:'smooth'});
        }
        function resetForm() { 
            ['pName', 'pPrice', 'pOld', 'pCat', 'pImg', 'pDesc', 'editId'].forEach(id => document.getElementById(id).value = '');
        }

        function exportDB() { 
            const blob = new Blob([JSON.stringify(db)], {type: "application/json"}); 
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); 
            a.download = "catalogue_cs_ngallele.json"; a.click(); 
        }
        function importDB(e) {
            const reader = new FileReader();
            reader.onload = function(evt) {
                db = JSON.parse(evt.target.result);
                localStorage.setItem('cs_2026_pro', JSON.stringify(db));
                location.reload();
            };
            reader.readAsText(e.target.files[0]);
        }
    </script>
</body>
</html>
