<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cosmétique Services | Boutique Officielle</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- SDK FIREBASE -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getDatabase, ref, onValue, push, remove, set, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

      const firebaseConfig = {
        apiKey: "AIzaSyBhCAp0R6b4QH0fKjFWZiF4fboAQwWcp9I",
        authDomain: "cosmetiqueservices.firebaseapp.com",
        databaseURL: "https://cosmetiqueservices-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "cosmetiqueservices",
        storageBucket: "cosmetiqueservices.appspot.com",
        messagingSenderId: "838206036615",
        appId: "1:838206036615:web:ef9b5e78f882cdfb3b3622"
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);
      window.dbRef = ref(db, 'produits');

      // ÉCOUTEUR GLOBAL (Pour tout le monde, pas seulement le gérant)
      onValue(window.dbRef, (snapshot) => {
        const data = snapshot.val();
        window.allProducts = data ? Object.keys(data).map(key => ({id: key, ...data[key]})) : [];
        
        // Cacher le loader si les données sont là
        document.getElementById('mainLoader').style.display = 'none';
        
        // Lancer le rendu
        renderItems();
        renderChips();
        if(window.isGerantAccess) {
            renderAdminList();
            updateStats();
        }
      }, (error) => {
          console.error("Erreur Firebase:", error);
          alert("Erreur de connexion à la base de données. Vérifiez vos règles Firebase.");
      });

      // Fonctions Globales
      window.apiSave = (data) => push(window.dbRef, data);
      window.apiUpdate = (id, data) => set(ref(db, 'produits/' + id), data);
      window.apiDelete = (id) => remove(ref(db, 'produits/' + id));
    </script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { 
                colors: { gold: '#C5A059', deep: '#050505', luxury: '#111111' },
                fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'], serif: ['Playfair Display', 'serif'] }
            } }
        }
    </script>
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
        .dark .glass { background: rgba(10, 10, 10, 0.8); }
        .gold-gradient { background: linear-gradient(135deg, #C5A059, #F9F295, #C5A059); }
        .gold-text { background: linear-gradient(135deg, #C5A059, #F9F295, #B38728); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #splash { background: #000; z-index: 10000; transition: 0.8s; }
        .splash-hide { opacity: 0; pointer-events: none; }
        .p-card { transition: 0.3s; }
        .p-card:active { scale: 0.95; }
        #mainLoader { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 50; }
    </style>
</head>

<body class="bg-[#F9F9F9] dark:bg-deep text-luxury dark:text-gray-100 pb-32 overflow-x-hidden">

    <!-- 1. SPLASH SCREEN -->
    <div id="splash" class="fixed inset-0 flex flex-col items-center justify-center">
        <div class="w-16 h-16 border-2 border-gold rounded-full flex items-center justify-center animate-spin mb-4">
            <span class="text-gold font-serif text-xl font-bold animate-pulse">CS</span>
        </div>
        <h1 class="text-white font-serif text-lg tracking-[0.3em] font-bold uppercase">Cosmétique Services</h1>
    </div>

    <!-- LOADER DE CHARGEMENT DONNÉES -->
    <div id="mainLoader">
        <div class="flex flex-col items-center gap-2">
            <div class="w-8 h-8 border-4 border-gold/20 border-t-gold rounded-full animate-spin"></div>
            <p class="text-[8px] font-bold uppercase tracking-widest opacity-40">Chargement du catalogue...</p>
        </div>
    </div>

    <!-- NOTIFICATIONS -->
    <div id="toast" class="fixed top-8 left-1/2 -translate-x-1/2 z-[11000] glass px-6 py-3 rounded-2xl shadow-2xl opacity-0 transition-all duration-500 translate-y-[-50px] flex items-center gap-3 border border-gold/20">
        <span id="toastMsg" class="text-[10px] font-black uppercase tracking-widest text-black dark:text-white"></span>
    </div>

    <!-- HEADER -->
    <header id="smartNav" class="fixed top-0 inset-x-0 z-[90] glass border-b border-gray-100 dark:border-white/5 px-6 py-5">
        <div class="max-w-6xl mx-auto space-y-5">
            <div class="flex justify-between items-center">
                <div class="flex flex-col">
                    <h1 class="font-serif text-2xl font-black tracking-tight leading-none">CS <span class="gold-text italic">SHOP</span></h1>
                    <p class="text-[8px] uppercase tracking-[0.4em] opacity-40 font-bold mt-1">Marketplace Saint-Louis</p>
                </div>
                <div class="flex items-center gap-4">
                    <button onclick="toggleTheme()" class="w-10 h-10 rounded-full flex items-center justify-center bg-gray-50 dark:bg-white/5 border border-black/5"><i class="fas fa-adjust"></i></button>
                    <div class="relative cursor-pointer" onclick="openCart()">
                        <i class="fas fa-shopping-bag text-xl"></i>
                        <span id="cartBadge" class="absolute -top-1 -right-1 bg-red-500 text-white text-[9px] font-black w-4 h-4 flex items-center justify-center rounded-full hidden">0</span>
                    </div>
                </div>
            </div>
            
            <div class="flex gap-2">
                <div class="relative flex-grow">
                    <input type="text" id="searchInput" oninput="renderItems()" placeholder="Rechercher un article..." class="w-full bg-gray-100 dark:bg-white/5 border-none rounded-xl py-3.5 pl-10 pr-4 text-[11px] font-bold outline-none">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i>
                </div>
                <select id="sortSelect" onchange="renderItems()" class="bg-gray-100 dark:bg-white/5 rounded-xl px-3 text-[9px] font-bold border-none outline-none">
                    <option value="new">Nouveautés</option>
                    <option value="price-asc">Prix ↑</option>
                    <option value="price-desc">Prix ↓</option>
                </select>
            </div>
        </div>
        <div id="catBar" class="flex gap-2 overflow-x-auto no-scrollbar px-6 mt-4"></div>
    </header>

    <!-- HERO (Simple et rapide) -->
    <section class="mt-52 px-6 max-w-6xl mx-auto text-center py-10 animate__animated animate__fadeIn">
        <h2 class="font-serif text-3xl font-black mb-2">L'Élégance <span class="gold-text italic">Premium</span></h2>
        <p class="text-[8px] opacity-40 uppercase tracking-[0.5em] font-black">Livraison Rapide • Qualité Garantie</p>
    </section>

    <!-- GRILLE PRODUITS -->
    <main id="itemGrid" class="px-6 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5 max-w-6xl mx-auto mb-20"></main>

    <!-- NAVIGATION BAS -->
    <nav class="fixed bottom-6 inset-x-6 h-16 glass rounded-[2rem] z-[100] flex justify-around items-center px-2 shadow-2xl border border-white/20">
        <button onclick="changeTab('home')" id="nav-home" class="flex flex-col items-center gap-1 text-gold"><i class="fas fa-home text-lg"></i><span class="text-[7px] uppercase font-black">Boutique</span></button>
        <button onclick="changeTab('wish')" id="nav-wish" class="flex flex-col items-center gap-1 text-gray-400 relative"><i class="fas fa-heart text-lg"></i><span id="wishCount" class="absolute -top-1 -right-1 bg-gold text-black text-[7px] w-4 h-4 rounded-full hidden flex items-center justify-center font-black">0</span><span class="text-[7px] uppercase font-black">Favoris</span></button>
        <button onclick="openCart()" class="flex flex-col items-center gap-1 text-gray-400"><i class="fas fa-shopping-cart text-lg"></i><span class="text-[7px] uppercase font-black">Panier</span></button>
        <button onclick="openAdmin()" id="nav-admin" class="flex flex-col items-center gap-1 text-gray-400"><i class="fas fa-user-crown text-lg"></i><span class="text-[7px] uppercase font-black">Gérant</span></button>
    </nav>

    <!-- PANIER -->
    <div id="cartOverlay" class="fixed inset-0 bg-black/80 z-[200] hidden backdrop-blur-md" onclick="closeCart()"></div>
    <aside id="cartDrawer" class="fixed right-0 top-0 bottom-0 w-full max-w-md bg-white dark:bg-[#080808] z-[210] translate-x-full transition-transform duration-500 flex flex-col shadow-2xl rounded-l-[2rem] overflow-hidden">
        <div class="p-6 border-b dark:border-white/5 flex justify-between items-center">
            <h2 class="text-lg font-serif font-black uppercase">Mon Panier</h2>
            <button onclick="closeCart()" class="text-2xl">&times;</button>
        </div>
        <div id="cartItems" class="flex-grow overflow-y-auto p-5 space-y-4 no-scrollbar"></div>
        <div class="p-6 space-y-4 bg-gray-50 dark:bg-white/5">
            <input type="text" id="clientName" placeholder="Votre Nom" class="w-full p-4 rounded-xl bg-white dark:bg-black text-[11px] font-bold outline-none border border-black/5">
            <input type="text" id="clientArea" placeholder="Quartier de livraison" class="w-full p-4 rounded-xl bg-white dark:bg-black text-[11px] font-bold outline-none border border-black/5">
            <div class="flex justify-between items-center py-2"><span class="text-[10px] font-bold opacity-40 uppercase">Total</span><span id="cartTotal" class="text-xl font-black gold-text">0 F</span></div>
            <button onclick="sendOrder()" class="w-full gold-gradient text-black py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-lg">Commander WhatsApp</button>
        </div>
    </aside>

    <!-- ESPACE GÉRANT -->
    <div id="adminPanel" class="fixed inset-0 z-[5000] hidden bg-white dark:bg-deep p-6 overflow-y-auto no-scrollbar">
        <div class="max-w-4xl mx-auto">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-xl font-serif font-black gold-text uppercase">Gestion Boutique</h2>
                <button onclick="closeAdmin()" class="text-3xl">&times;</button>
            </div>
            
            <div id="adminAuth" class="text-center py-20">
                <input type="password" id="adminPass" class="w-full max-w-xs bg-transparent border-b-2 border-gold p-4 text-center text-2xl outline-none mb-10 font-black dark:text-white" placeholder="CODE GÉRANT">
                <button onclick="verifyAdmin()" class="w-full max-w-xs gold-gradient text-black py-4 rounded-2xl font-black uppercase text-[10px]">Accéder au Dashboard</button>
            </div>

            <div id="adminTools" class="hidden space-y-8 pb-40">
                <!-- STATS -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                    <div class="bg-gray-100 dark:bg-white/5 p-4 rounded-2xl text-center"><p class="text-[7px] font-black opacity-40">ARTICLES</p><p id="statTotal" class="text-lg font-black">0</p></div>
                    <div class="bg-gold/10 p-4 rounded-2xl text-center"><p class="text-[7px] font-black text-gold">STOCK VALEUR</p><p id="statStock" class="text-lg font-black text-gold">0 F</p></div>
                    <div class="bg-red-500/10 p-4 rounded-2xl text-center"><p class="text-[7px] font-black text-red-500">RUPTURES</p><p id="statOut" class="text-lg font-black text-red-500">0</p></div>
                    <div class="bg-green-500/10 p-4 rounded-2xl text-center"><p class="text-[7px] font-black text-green-500">PROMOS</p><p id="statPromo" class="text-lg font-black text-green-500">0</p></div>
                </div>

                <form id="saveForm" class="bg-gray-50 dark:bg-premium p-6 rounded-[2rem] space-y-4 border border-gray-100 dark:border-white/5" onsubmit="handleSave(event)">
                    <input type="hidden" id="editId">
                    <input type="hidden" id="currentImgUrl">
                    
                    <div class="flex items-center gap-5">
                        <div class="w-24 h-24 rounded-2xl bg-gray-200 dark:bg-white/10 flex items-center justify-center overflow-hidden border-2 border-dashed border-gold relative" id="photoPreview">
                            <i class="fas fa-camera text-gold text-xl"></i>
                            <input type="file" accept="image/*" onchange="previewAndCompress(event)" class="absolute inset-0 opacity-0 cursor-pointer">
                        </div>
                        <div class="flex-grow space-y-3">
                            <input type="text" id="pName" placeholder="Nom du produit" class="w-full p-3.5 rounded-xl bg-white dark:bg-black border-none text-[11px] font-bold" required>
                            <div class="grid grid-cols-2 gap-3">
                                <input type="number" id="pPrice" placeholder="Prix" class="p-3.5 rounded-xl bg-white dark:bg-black border-none text-[11px] font-black" required>
                                <input type="number" id="pPromo" placeholder="Prix Promo" class="p-3.5 rounded-xl bg-white dark:bg-black border-none text-[11px] font-black">
                            </div>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <select id="pCat" class="p-3.5 rounded-xl bg-white dark:bg-black border-none text-[10px] font-bold outline-none"></select>
                        <label class="flex items-center justify-between px-4 bg-white dark:bg-black rounded-xl text-[8px] font-black uppercase opacity-60">En Stock <input type="checkbox" id="pStock" checked class="w-5 h-5 accent-gold"></label>
                    </div>
                    <textarea id="pDesc" placeholder="Description courte..." class="w-full p-3.5 rounded-xl bg-white dark:bg-black border-none text-[11px] h-20 outline-none"></textarea>
                    <button type="submit" id="submitBtn" class="w-full gold-gradient text-black py-4 rounded-xl font-black uppercase text-[10px] tracking-widest shadow-xl">Publier l'Article</button>
                    <button type="button" id="cancelBtn" onclick="resetForm()" class="hidden w-full text-red-500 font-black uppercase text-[8px]">Annuler la modification</button>
                </form>
                <div id="adminProdList" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <!-- MODAL DETAIL -->
    <div id="detailModal" class="fixed inset-0 z-[2000] hidden bg-black/95 backdrop-blur-md flex flex-col items-center justify-center p-6">
        <div class="w-full max-w-lg bg-white dark:bg-premium rounded-[2.5rem] overflow-hidden shadow-2xl relative">
            <button onclick="closeDetail()" class="absolute top-5 right-5 w-10 h-10 bg-black/50 text-white rounded-full text-xl">&times;</button>
            <div id="detailImg" class="h-72 w-full overflow-hidden"></div>
            <div class="p-8">
                <span id="detailCat" class="text-[8px] font-black text-gold uppercase tracking-widest mb-2 block"></span>
                <h2 id="detailName" class="text-2xl font-serif font-black mb-3"></h2>
                <p id="detailDesc" class="text-xs opacity-60 mb-6 italic leading-relaxed"></p>
                <div class="flex justify-between items-center">
                    <div><p id="detailPrice" class="text-2xl font-black"></p><p id="detailPromo" class="text-xs line-through opacity-20"></p></div>
                    <button id="addBtnDetail" class="px-8 py-4 gold-gradient text-black rounded-xl font-black uppercase text-[9px]">Ajouter</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let cart = [], wishlist = JSON.parse(localStorage.getItem('cs_favs_final')) || [], currentFilter = 'Tout', currentTab = 'home', compressedImg = '', isGerantAccess = false;
        const categories = ['✨ Cosmétique', '🌸 Parfums', '👕 Vêtements', '👟 Chaussures', '📱 Électronique', '🎧 Accessoires Tech', '⌚ Montres & Bijoux', '👜 Sacs & Maroquinerie', '🏠 Maison & Déco', '💄 Maquillage', '⚡ Accessoires', '🎮 Gaming', '🛒 Supermarché', '🧸 Enfants & Jouets', '🏋️ Sport', '📚 Livres & Fournitures', '🚗 Auto & Moto', '➕ Autre'];

        // SYSTÈME DE COMPRESSION PHOTO RAPIDE
        function previewAndCompress(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = function(event) {
                const img = new Image();
                img.src = event.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 500; 
                    const scaleSize = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scaleSize;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    compressedImg = canvas.toDataURL('image/jpeg', 0.6); // Compression 60%
                    document.getElementById('photoPreview').innerHTML = `<img src="${compressedImg}" class="w-full h-full object-cover">`;
                };
            };
        }

        // RENDU PRODUITS (PUBLIC)
        window.renderItems = () => {
            const grid = document.getElementById('itemGrid');
            if(!window.allProducts) return;
            
            const search = document.getElementById('searchInput').value.toLowerCase();
            const sort = document.getElementById('sortSelect').value;
            grid.innerHTML = '';

            let filtered = window.allProducts.filter(p => {
                const matchesSearch = p.name?.toLowerCase().includes(search) || p.cat?.toLowerCase().includes(search);
                const matchesFilter = currentFilter === 'Tout' || p.cat === currentFilter;
                const matchesTab = currentTab === 'wish' ? wishlist.includes(p.id) : true;
                return matchesSearch && matchesFilter && matchesTab;
            });

            if(sort === 'price-asc') filtered.sort((a,b) => (a.promoPrice || a.price) - (b.promoPrice || b.price));
            if(sort === 'price-desc') filtered.sort((a,b) => (b.promoPrice || b.price) - (a.promoPrice || a.price));

            filtered.forEach(p => {
                const out = p.stock === false; const loved = wishlist.includes(p.id);
                grid.innerHTML += `
                    <div class="p-card bg-white dark:bg-premium rounded-[2rem] overflow-hidden shadow-sm relative animate__animated animate__fadeIn">
                        ${out ? '<div class="absolute inset-0 bg-black/50 z-10 flex items-center justify-center"><span class="bg-white text-black text-[7px] font-black px-3 py-1.5 rounded-full uppercase">Épuisé</span></div>' : ''}
                        <button onclick="toggleWish('${p.id}', event)" class="absolute top-3 right-3 w-8 h-8 rounded-full bg-white/80 dark:bg-black/30 flex items-center justify-center z-20">
                            <i class="fa${loved?'s':'r'} fa-heart ${loved?'text-red-500':''}"></i>
                        </button>
                        <div class="h-44 overflow-hidden" onclick="openDetail('${p.id}')"><img src="${p.img}" class="w-full h-full object-cover" loading="lazy"></div>
                        <div class="p-5 text-center">
                            <span class="text-[6px] text-gold font-black uppercase">${p.cat}</span>
                            <h3 class="font-bold text-[9px] uppercase truncate my-2">${p.name}</h3>
                            <div class="flex items-center justify-center gap-2 mb-3">
                                <span class="font-black text-[11px]">${(p.promoPrice || p.price).toLocaleString()} F</span>
                                ${p.promoPrice ? `<span class="text-[8px] line-through opacity-20">${p.price.toLocaleString()} F</span>` : ''}
                            </div>
                            <button onclick="addToCart('${p.id}')" ${out ? 'disabled' : ''} class="w-full gold-gradient py-3 rounded-xl text-[8px] font-black uppercase text-black">Ajouter</button>
                        </div>
                    </div>
                `;
            });
        };

        window.renderChips = () => {
            const list = ['Tout', ...categories];
            document.getElementById('catBar').innerHTML = list.map(c => `
                <button onclick="setFilter('${c}')" class="px-5 py-2.5 rounded-full border dark:border-white/5 whitespace-nowrap text-[8px] font-bold transition-all ${currentFilter === c ? 'gold-gradient text-black border-gold' : 'bg-white dark:bg-white/5 opacity-40'}">${c}</button>
            `).join('');
        };

        // ADMIN ACCESS & ACTIONS
        window.verifyAdmin = () => {
            if(document.getElementById('adminPass').value === "2026") {
                isGerantAccess = true; window.isGerantAccess = true;
                document.getElementById('adminAuth').classList.add('hidden');
                document.getElementById('adminTools').classList.remove('hidden');
                renderAdminList(); updateStats();
                showToast("Accès Gérant Validé");
            } else { showToast("Code incorrect"); }
        };

        window.handleSave = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = "Traitement...";
            
            const id = document.getElementById('editId').value;
            const finalImg = compressedImg || document.getElementById('currentImgUrl').value;
            
            if(!finalImg) { btn.disabled = false; btn.innerText = "Réessayer"; return showToast("Photo Requise !"); }

            const data = {
                name: document.getElementById('pName').value,
                price: parseInt(document.getElementById('pPrice').value),
                promoPrice: document.getElementById('pPromo').value ? parseInt(document.getElementById('pPromo').value) : null,
                cat: document.getElementById('pCat').value,
                desc: document.getElementById('pDesc').value,
                stock: document.getElementById('pStock').checked,
                img: finalImg,
                date: Date.now()
            };

            try {
                if(id) await window.apiUpdate(id, data);
                else await window.apiSave(data);
                showToast("Article enregistré ! ✅");
                resetForm();
            } catch (err) {
                showToast("Erreur Base de données ❌");
                console.error(err);
            } finally {
                btn.disabled = false; btn.innerText = "Publier l'Article";
            }
        };

        window.renderAdminList = () => {
            document.getElementById('adminProdList').innerHTML = window.allProducts.map(p => `
                <div class="flex items-center gap-4 bg-white dark:bg-white/5 p-4 rounded-2xl border dark:border-white/5">
                    <img src="${p.img}" class="w-10 h-10 rounded-lg object-cover">
                    <div class="flex-grow font-black text-[9px] uppercase truncate">${p.name}</div>
                    <div class="flex gap-3">
                        <button onclick="editProduct('${p.id}')" class="text-blue-500"><i class="fas fa-edit"></i></button>
                        <button onclick="if(confirm('Supprimer cet article ?')) window.apiDelete('${p.id}')" class="text-red-500"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        };

        window.editProduct = (id) => {
            const p = window.allProducts.find(x => x.id === id);
            document.getElementById('editId').value = p.id;
            document.getElementById('currentImgUrl').value = p.img;
            document.getElementById('pName').value = p.name;
            document.getElementById('pPrice').value = p.price;
            document.getElementById('pPromo').value = p.promoPrice || '';
            document.getElementById('pCat').value = p.cat;
            document.getElementById('pDesc').value = p.desc;
            document.getElementById('pStock').checked = p.stock !== false;
            document.getElementById('photoPreview').innerHTML = `<img src="${p.img}" class="w-full h-full object-cover">`;
            document.getElementById('submitBtn').innerText = "Mettre à jour l'article";
            document.getElementById('cancelBtn').classList.remove('hidden');
        };

        // HELPERS
        function updateStats() {
            if(!isGerantAccess) return;
            document.getElementById('statTotal').innerText = window.allProducts.length;
            const totalVal = window.allProducts.reduce((acc, p) => acc + (p.price || 0), 0);
            document.getElementById('statStock').innerText = totalVal.toLocaleString() + ' F';
            document.getElementById('statOut').innerText = window.allProducts.filter(p => p.stock === false).length;
            document.getElementById('statPromo').innerText = window.allProducts.filter(p => p.promoPrice).length;
        }

        window.addToCart = (id) => {
            const p = window.allProducts.find(x => x.id === id);
            const exist = cart.find(x => x.id === id);
            if(exist) exist.qty++; else cart.push({...p, qty: 1});
            updateCartBadge(); showToast("Panier mis à jour");
        };

        function updateCartBadge() { const b = document.getElementById('cartBadge'); const total = cart.reduce((a,c) => a + c.qty, 0); b.innerText = total; b.classList.toggle('hidden', total === 0); }
        window.updateCartUI = () => {
            let total = 0;
            document.getElementById('cartItems').innerHTML = cart.map((item, idx) => {
                const price = item.promoPrice || item.price; total += price * item.qty;
                return `<div class="flex items-center gap-4 bg-gray-50 dark:bg-white/5 p-4 rounded-2xl border dark:border-white/5">
                    <img src="${item.img}" class="w-12 h-12 rounded-lg object-cover">
                    <div class="flex-grow font-black text-[9px] uppercase">${item.name}<p class="text-gold font-black">${price.toLocaleString()} F</p></div>
                    <div class="flex items-center gap-2">
                        <button onclick="changeQty(${idx}, -1)" class="w-6 h-6 bg-white dark:bg-black rounded-full border">-</button>
                        <span class="text-[10px] font-bold">${item.qty}</span>
                        <button onclick="changeQty(${idx}, 1)" class="w-6 h-6 bg-white dark:bg-black rounded-full border">+</button>
                    </div>
                </div>`;
            }).join('');
            document.getElementById('cartTotal').innerText = total.toLocaleString() + " F";
        };

        window.changeQty = (idx, d) => { cart[idx].qty += d; if(cart[idx].qty < 1) cart.splice(idx,1); window.updateCartUI(); updateCartBadge(); };
        window.sendOrder = () => {
            const n = document.getElementById('clientName').value, a = document.getElementById('clientArea').value;
            if(!n || !a || !cart.length) return showToast("Veuillez remplir vos infos");
            let m = `*COMMANDE COSMÉTIQUE SERVICES*%0A👤 Client: ${n}%0A📍 Lieu: ${a}%0A----------------------------%0A`;
            cart.forEach(i => m += `• ${i.qty}x *${i.name}* (${(i.promoPrice||i.price)*i.qty} F)%0A`);
            m += `----------------------------%0A💰 TOTAL: ${document.getElementById('cartTotal').innerText}`;
            window.open(`https://wa.me/221778165450?text=${m}`, '_blank');
        };

        function renderCatSelect() { document.getElementById('pCat').innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join(''); }
        window.setFilter = (c) => { currentFilter = c; currentTab = 'home'; window.renderItems(); window.renderChips(); updateNavUI(); };
        function updateNavUI() { document.querySelectorAll('nav button').forEach(b => b.classList.replace('text-gold', 'text-gray-400')); const act = document.getElementById('nav-' + currentTab); if(act) act.classList.replace('text-gray-400', 'text-gold'); }
        window.showToast = (m) => { const t = document.getElementById('toast'); document.getElementById('toastMsg').innerText = m; t.style.opacity = '1'; t.style.transform = 'translate(-50%, 0)'; setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translate(-50%, -50px)'; }, 3000); };
        window.toggleWish = (id, e) => { e.stopPropagation(); const idx = wishlist.indexOf(id); if(idx > -1) wishlist.splice(idx,1); else wishlist.push(id); localStorage.setItem('cs_favs_final', JSON.stringify(wishlist)); updateWishCount(); window.renderItems(); };
        function updateWishCount() { const el = document.getElementById('wishCount'); el.innerText = wishlist.length; el.classList.toggle('hidden', wishlist.length === 0); }
        window.openDetail = (id) => {
            const p = window.allProducts.find(x => x.id === id);
            document.getElementById('detailImg').innerHTML = `<img src="${p.img}" class="w-full h-full object-cover">`;
            document.getElementById('detailName').innerText = p.name;
            document.getElementById('detailCat').innerText = p.cat;
            document.getElementById('detailPrice').innerText = (p.promoPrice || p.price).toLocaleString() + " F";
            document.getElementById('detailPromo').innerText = p.promoPrice ? p.price.toLocaleString() + " F" : "";
            document.getElementById('detailDesc').innerText = p.desc || "Sélection exclusive par Cosmétique Services.";
            document.getElementById('addBtnDetail').onclick = () => { window.addToCart(p.id); closeDetail(); };
            document.getElementById('detailModal').style.display = 'flex';
        };
        window.closeDetail = () => document.getElementById('detailModal').style.display = 'none';
        window.openCart = () => { document.getElementById('cartDrawer').style.transform = 'translateX(0)'; document.getElementById('cartOverlay').classList.remove('hidden'); window.updateCartUI(); };
        window.closeCart = () => { document.getElementById('cartDrawer').style.transform = 'translateX(100%)'; document.getElementById('cartOverlay').classList.add('hidden'); };
        window.openAdmin = () => { document.getElementById('adminPanel').classList.remove('hidden'); if(isGerantAccess) { renderAdminList(); updateStats(); } };
        window.closeAdmin = () => document.getElementById('adminPanel').classList.add('hidden');
        window.toggleTheme = () => { const d = document.documentElement.classList.toggle('dark'); localStorage.setItem('cs_theme', d ? 'dark' : 'light'); };
        
        // AUTO-HIDE SPLASH
        setTimeout(() => { document.getElementById('splash').classList.add('splash-hide'); }, 2500);
    </script>
</body>
                </html>
